name: Bug report
description: Report a defect in cascade
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below
        so we can reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: cascade version
      description: Output of `pip show cascade | grep Version` or git SHA
      placeholder: "0.3.0 or commit a1b2c3d"
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Affected subsystem
      multiple: true
      options:
        - agents (drafter, critic, aligner, check-in, reflector, risk)
        - memory (causal graph, retrieval, context builder)
        - mcp (server, tools)
        - api (FastAPI routes, auth)
        - evals (RAGAS, DeepEval, red-team)
        - observability (LangSmith, Langfuse, MLflow)
        - ui (Streamlit)
        - storage (Postgres, ChromaDB)
        - other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction. Include commands, payloads, and the agent prompt if relevant.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, LLM provider (Groq / Together / etc.), Postgres version
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and trace IDs
      description: Paste structlog output and LangSmith / Langfuse trace links. Redact secrets.
      render: text
