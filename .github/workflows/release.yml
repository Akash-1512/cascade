name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write   # required for ghcr.io push

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        # Required for arm64 emulation when building multi-arch images
        # on an amd64 runner. Apple Silicon developers running locally
        # need arm64; production clusters are almost always amd64.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # GITHUB_TOKEN works for ghcr.io when packages:write is granted
        # at the job permissions level; no manual PAT setup needed.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        # Produces tags: <version> + 'latest' on tag push.
        # ghcr.io/akash-1512/cascade:0.20.0 and :latest.
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akash-1512/cascade
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section
        id: changelog
        run: |
          python - <<'PY'
          import os, re, pathlib
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          body = (m.group(1).strip() if m else f"Release {tag}")
          # Add docker pull instruction at the top of the release notes
          docker_line = (
              f"## Container image\n\n"
              f"    docker pull ghcr.io/akash-1512/cascade:{tag}\n\n"
          )
          out = pathlib.Path("RELEASE_NOTES.md")
          out.write_text(docker_line + body, encoding="utf-8")
          PY

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          generate_release_notes: false
          fail_on_unmatched_files: true
