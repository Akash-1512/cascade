name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  types:
    name: Static types (mypy, advisory)
    runs-on: ubuntu-latest
    # mypy runs in strict mode against a codebase that's being progressively
    # type-cleaned. The job is advisory: errors show in the PR check list but
    # don't block merges. As the type-error count comes down (current: ~54;
    # tracked in TYPING.md) the continue-on-error will be removed and the job
    # will gate merges. See ADR-0004 (TBD) for the deliberate ramp.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package
        run: pip install -e ".[dev,ui]"

      - name: Mypy
        run: mypy cascade/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package
        # [ui] needed for streamlit-driven UI tests; [observability] not
        # needed because those tests mock the optional deps via sys.modules.
        run: pip install -e ".[dev,ui]"

      - name: Run unit tests
        run: pytest -m unit --cov=cascade --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # codecov outages don't gate merges
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cascade
          POSTGRES_PASSWORD: cascade
          POSTGRES_DB: cascade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package
        run: pip install -e ".[dev,ui]"

      - name: Run integration tests
        env:
          # CASCADE_TEST_DATABASE_URL routes the test fixtures at Postgres;
          # the conftest enables PG-specific types (UUID, JSONB) when the
          # URL is postgres-shaped and falls back to SQLite otherwise.
          DATABASE_URL: postgresql+psycopg://cascade:cascade@localhost:5432/cascade_test
          CASCADE_TEST_DATABASE_URL: postgresql+psycopg://cascade:cascade@localhost:5432/cascade_test
          # Live e2e tests skip themselves when GROQ_API_KEY is unset;
          # passing through the secret enables them for forks that set it.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest -m integration --cov=cascade --cov-append --cov-report=xml

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    # Runs helm lint + helm template against helm/cascade/. The structural
    # python validator (tests/unit/test_helm_chart.py) catches the most
    # common drift inside the standard pytest run; this job is the
    # authoritative check against real Helm.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Update chart dependencies
        # Pulls the bitnami/postgresql subchart referenced in Chart.yaml.
        # Required before lint/template because the chart declares a
        # dependency on a remote repo.
        run: |
          helm dependency update helm/cascade/

      - name: Helm lint
        run: helm lint helm/cascade/

      - name: Helm template (dev values)
        # Render the chart against the dev values to catch template
        # errors that lint alone misses (mostly: helpers that take args
        # and fail on certain value combinations). The rendered output
        # is piped through kubectl --dry-run=client where it's
        # available; on a clean runner we just verify the rendering
        # succeeds and emits non-empty YAML.
        run: |
          helm template cascade-test helm/cascade/ \
            --values helm/cascade/values-dev.yaml \
            --set secrets.groqApiKey=fake-key-for-lint > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml || (echo "Empty render output"; exit 1)
          echo "Rendered $(wc -l < /tmp/rendered.yaml) lines of YAML"

  docker-build:
    name: Docker image build (no push)
    runs-on: ubuntu-latest
    # Builds the cascade image on every PR to verify the Dockerfile
    # stays in sync with the codebase. Push happens only on tag from
    # release.yml — this job catches build-time regressions before
    # they hit the release path.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push, single arch for speed)
        # Single-arch build for PR speed. The release workflow's
        # docker job does multi-arch (amd64+arm64). PR builds catch
        # the same syntax + dependency errors at half the runtime.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cascade:pr-${{ github.event.pull_request.number || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # build gates on lint and unit-tests only — types is advisory (continue-
    # on-error). Integration tests are heavier and can flake on transient
    # Postgres readiness; gating on unit-tests is enough to catch real
    # regressions while keeping the release path fast.
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
