target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "migrations/versions",
    "*.egg-info",
]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "N",      # pep8-naming
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
    "ASYNC",  # async best practices
    "S",      # bandit security
]
ignore = [
    "E501",   # line length — let formatter handle it
    "S101",   # asserts in tests are fine
    "B008",   # function calls in defaults — FastAPI Depends pattern
    "RUF012", # mutable class attrs — pydantic ClassVar pattern
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "ARG", "PLR2004"]
"cascade/cli.py" = ["T20"]
"migrations/**/*.py" = ["E402", "F401"]

[lint.isort]
known-first-party = ["cascade"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
