{{- if .Values.api.enabled -}}
{{- $dbSecret := splitList "," (include "cascade.databasePasswordSecret" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cascade.componentName" (dict "context" . "component" "api") }}
  labels:
    {{- include "cascade.labels" . | nindent 4 }}
    {{- include "cascade.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "cascade.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cascade.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cascade.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "cascade.image" (dict "context" . "component" .Values.api) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "cascade.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cascade.fullname" . }}-config
            - secretRef:
                name: {{ include "cascade.secretName" . }}
          env:
            # Postgres password comes via env so it doesn't sit in the
            # ConfigMap. The DATABASE_URL is composed by the entrypoint
            # using $POSTGRES_PASSWORD.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ index $dbSecret 0 }}
                  key: {{ index $dbSecret 1 }}
            - name: DATABASE_URL
              value: {{ include "cascade.databaseUrl" . | quote }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cascade.componentName" (dict "context" . "component" "api") }}
  labels:
    {{- include "cascade.labels" . | nindent 4 }}
    {{- include "cascade.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cascade.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
{{- end }}
