{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cascade.componentName" (dict "context" . "component" "ui") }}
  labels:
    {{- include "cascade.labels" . | nindent 4 }}
    {{- include "cascade.selectorLabels" (dict "context" . "component" "ui") | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "cascade.selectorLabels" (dict "context" . "component" "ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cascade.selectorLabels" (dict "context" . "component" "ui") | nindent 8 }}
      {{- with .Values.ui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cascade.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "cascade.image" (dict "context" . "component" .Values.ui) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Streamlit needs --server.address 0.0.0.0 to bind beyond loopback
          # inside a container. --server.port matches the service.
          command:
            - streamlit
            - run
            - cascade/ui/app.py
            - --server.address=0.0.0.0
            - --server.port={{ .Values.ui.service.port }}
            - --server.headless=true
            - --browser.gatherUsageStats=false
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          env:
            # The UI talks to the API over the in-cluster service DNS name.
            - name: CASCADE_API_BASE_URL
              value: "http://{{ include "cascade.componentName" (dict "context" . "component" "api") }}:{{ .Values.api.service.port }}"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cascade.fullname" . }}-config
                  key: LOG_LEVEL
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cascade.componentName" (dict "context" . "component" "ui") }}
  labels:
    {{- include "cascade.labels" . | nindent 4 }}
    {{- include "cascade.selectorLabels" (dict "context" . "component" "ui") | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cascade.selectorLabels" (dict "context" . "component" "ui") | nindent 4 }}
{{- end }}
