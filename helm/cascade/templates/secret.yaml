{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cascade.secretName" . }}
  labels:
    {{- include "cascade.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Required for the LLM agents to work.
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}

  {{- if .Values.secrets.togetherApiKey }}
  # Fallback when Groq is throttled.
  TOGETHER_API_KEY: {{ .Values.secrets.togetherApiKey | quote }}
  {{- end }}

  {{- if .Values.secrets.langsmithApiKey }}
  LANGSMITH_API_KEY: {{ .Values.secrets.langsmithApiKey | quote }}
  {{- end }}

  {{- if .Values.secrets.langfusePublicKey }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  {{- end }}
{{- end }}
